spring:
  application:
    name: flowmat
  datasource:
    url: jdbc:postgresql://localhost:5432/flowmat
    username: flowmat
    password: flowmat
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  servlet:
    context-path: /api

logging:
  level:
    org.hibernate.SQL: debug
